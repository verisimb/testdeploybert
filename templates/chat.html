<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chat — Detektor Judi Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f4f5;
      --surface: #ffffff;
      --border: #e4e4e7;
      --text: #18181b;
      --muted: #71717a;
      --user-bubble: #18181b;
      --user-text: #fafafa;
      --assistant-bubble: #ffffff;
      --accent-safe: #16a34a;
      --accent-risk: #dc2626;
      --input-bg: #fafafa;
      --shadow: 0 1px 2px rgba(0,0,0,.06);
      --radius: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      height: 100dvh;
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #27272a, #3f3f46);
      display: grid;
      place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .brand h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand span {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-top: 1px;
    }

    header a {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      white-space: nowrap;
    }

    header a:hover {
      color: var(--text);
      background: var(--input-bg);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .welcome {
      align-self: center;
      text-align: center;
      max-width: 320px;
      padding: 24px 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .row {
      display: flex;
      width: 100%;
    }

    .row.user { justify-content: flex-end; }
    .row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: min(85%, 560px);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .row.user .bubble {
      background: var(--user-bubble);
      color: var(--user-text);
      border-bottom-right-radius: 6px;
    }

    .row.assistant .bubble {
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-bottom-left-radius: 6px;
    }

    .row.assistant .bubble.judi {
      border-color: rgba(220, 38, 38, 0.25);
      background: #fff5f5;
    }

    .row.assistant .bubble.bukan_judi {
      border-color: rgba(22, 163, 74, 0.25);
      background: #f0fdf4;
    }

    .assistant-title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .assistant-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }

    .prob-row {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .prob-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .bar {
      height: 6px;
      border-radius: 999px;
      background: #e4e4e7;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: 999px;
      width: 0;
      transition: width 0.35s ease;
    }

    .bar.judi span { background: var(--accent-risk); }
    .bar.safe span { background: var(--accent-safe); }

    .typing {
      display: flex;
      gap: 5px;
      padding: 4px 0;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.35;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.35; transform: scale(1); }
      40% { opacity: 1; transform: scale(1.05); }
    }

    .err-bubble {
      border-color: rgba(220, 38, 38, 0.35) !important;
      background: #fef2f2 !important;
      color: #991b1b;
      font-size: 14px;
    }

    .composer-wrap {
      flex-shrink: 0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .composer {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 720px;
      margin: 0 auto;
    }

    .composer textarea {
      flex: 1;
      min-height: 44px;
      max-height: 160px;
      resize: none;
      padding: 11px 14px;
      font: inherit;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--input-bg);
      color: var(--text);
      line-height: 1.45;
    }

    .composer textarea:focus {
      outline: none;
      border-color: #a1a1aa;
      background: var(--surface);
    }

    .composer textarea::placeholder {
      color: #a1a1aa;
    }

    .composer button {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--user-bubble);
      color: var(--user-text);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: opacity 0.2s, transform 0.15s;
    }

    .composer button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .composer button:not(:disabled):hover {
      transform: scale(1.03);
    }

    .composer button svg {
      width: 20px;
      height: 20px;
    }

    .composer-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">◇</div>
        <div>
          <h1>Asisten klasifikasi teks</h1>
          <span>IndoBERT · deteksi konteks judi online</span>
        </div>
      </div>
      <a href="/">Tampilan klasik</a>
    </header>

    <main class="messages" id="messages" aria-live="polite">
      <div class="welcome" id="welcome">
        Kirim sebuah teks di bawah. Model menganalisis apakah konteksnya mengarah ke <strong>judi online</strong> atau <strong>bukan</strong>, seperti percakapan dengan asisten AI.
      </div>
    </main>

    <div class="composer-wrap">
      <div class="composer">
        <textarea
          id="input"
          placeholder="Tulis pesan…"
          rows="1"
          maxlength="1000"
          autocomplete="off"
        ></textarea>
        <button type="button" id="send" title="Kirim" aria-label="Kirim">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404z"/>
          </svg>
        </button>
      </div>
      <p class="composer-hint">Enter kirim · Shift+Enter baris baru · maks. 1000 karakter</p>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const welcomeEl = document.getElementById('welcome');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideWelcome() {
      if (welcomeEl) welcomeEl.style.display = 'none';
    }

    function addUserBubble(text) {
      hideWelcome();
      const row = document.createElement('div');
      row.className = 'row user';
      const b = document.createElement('div');
      b.className = 'bubble';
      b.textContent = text;
      row.appendChild(b);
      messagesEl.appendChild(row);
      scrollBottom();
      return row;
    }

    function addTypingBubble() {
      const row = document.createElement('div');
      row.className = 'row assistant';
      const b = document.createElement('div');
      b.className = 'bubble';
      b.innerHTML = '<div class="typing" aria-label="Menunggu jawaban"><span></span><span></span><span></span></div>';
      row.appendChild(b);
      messagesEl.appendChild(row);
      scrollBottom();
      return row;
    }

    function addAssistantBubble(data) {
      const row = document.createElement('div');
      row.className = 'row assistant';
      const b = document.createElement('div');
      b.className = 'bubble ' + (data.label || '');
      const title = document.createElement('div');
      title.className = 'assistant-title';
      title.textContent = data.label_text || 'Hasil';
      const meta = document.createElement('div');
      meta.className = 'assistant-meta';
      meta.textContent = 'Inferensi: ' + data.ms + 'ms · keyakinan: ' + data.confidence + '%';
      const probWrap = document.createElement('div');
      probWrap.className = 'prob-row';
      probWrap.innerHTML = `
        <div>
          <div class="prob-label"><span>Judi online</span><span>${data.prob_judi}%</span></div>
          <div class="bar judi"><span style="width:${data.prob_judi}%"></span></div>
        </div>
        <div>
          <div class="prob-label"><span>Bukan judi</span><span>${data.prob_bukan_judi}%</span></div>
          <div class="bar safe"><span style="width:${data.prob_bukan_judi}%"></span></div>
        </div>
      `;
      b.appendChild(title);
      b.appendChild(meta);
      b.appendChild(probWrap);
      row.appendChild(b);
      messagesEl.appendChild(row);
      requestAnimationFrame(() => {
        probWrap.querySelectorAll('.bar span').forEach(s => {
          const w = s.style.width;
          s.style.width = '0';
          requestAnimationFrame(() => { s.style.width = w; });
        });
      });
      scrollBottom();
    }

    function addErrorBubble(msg) {
      const row = document.createElement('div');
      row.className = 'row assistant';
      const b = document.createElement('div');
      b.className = 'bubble err-bubble';
      b.textContent = msg;
      row.appendChild(b);
      messagesEl.appendChild(row);
      scrollBottom();
    }

    async function send() {
      const teks = inputEl.value.trim();
      if (!teks) return;

      addUserBubble(teks);
      inputEl.value = '';
      inputEl.style.height = 'auto';

      const typingRow = addTypingBubble();
      sendBtn.disabled = true;

      try {
        const res = await fetch('/api/prediksi', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ teks }),
        });
        const data = await res.json();
        typingRow.remove();
        if (!res.ok) throw new Error(data.error || 'Permintaan gagal');
        addAssistantBubble(data);
      } catch (e) {
        typingRow.remove();
        addErrorBubble('Terjadi kesalahan: ' + e.message);
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    });
  </script>
</body>
</html>
