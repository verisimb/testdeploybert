services:
  judi-detector:
    build: .
    container_name: judi-detector
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - HF_REPO_ID=verisimb/testindobertjudol
      - HF_TOKEN=hf_xxxx...   # ganti dengan token Read kamu
    # Cache model HuggingFace agar tidak download ulang tiap restart
    volumes:
      - hf_cache:/root/.cache/huggingface

volumes:
  hf_cache:
