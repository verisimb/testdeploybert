services:
  judi-detector:
    build: .
    container_name: judi-detector
    restart: unless-stopped
    # Coolify mengelola reverse proxy → cukup `expose`, jangan `ports`
    # (publish port langsung bisa bentrok dengan layer Traefik Coolify).
    expose:
      - "3000"
    environment:
      # Coolify men-set PORT=3000 secara default; samakan agar healthcheck/proxy match.
      - PORT=3000
      - HF_REPO_ID=verisimb/indobert2
      - HF_TOKEN=hf_xxxx... # ganti dengan token Read kamu (kosongkan jika repo public)
      # Pin thread ke 3 (VPS 4 core, sisakan 1 untuk OS/Coolify) — selaras dengan
      # Coolify Resource Limits → Number of CPUs = 3.
      - TORCH_NUM_THREADS=3
      - TORCH_INTER_OP_THREADS=1
      - OMP_NUM_THREADS=3
      - MKL_NUM_THREADS=3
    # Cache model HuggingFace agar tidak download ulang tiap restart
    volumes:
      - hf_cache:/root/.cache/huggingface

volumes:
  hf_cache:
